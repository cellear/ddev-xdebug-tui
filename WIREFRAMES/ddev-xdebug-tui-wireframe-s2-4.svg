<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 930 780" width="930" height="780" font-family="monospace" font-size="14">
  <!-- Window chrome -->
  <rect x="0" y="0" width="930" height="780" rx="8" fill="#1a1a1a" stroke="#888" stroke-width="2"/>
  <!-- Title bar -->
  <rect x="0" y="0" width="930" height="30" rx="8" fill="#3a3a3a"/>
  <rect x="0" y="15" width="930" height="15" fill="#3a3a3a"/>
  <circle cx="18" cy="15" r="6" fill="#ff5f57"/>
  <circle cx="38" cy="15" r="6" fill="#febc2e"/>
  <circle cx="58" cy="15" r="6" fill="#28c840"/>
  <text x="465" y="19" fill="#ccc" text-anchor="middle" font-size="12">php-test-project — ddev-xdebug-tui ‹ ddev xdebug-tui — 93×30</text>

  <!-- Status bar -->
  <rect x="10" y="40" width="910" height="28" fill="#0000ee"/>
  <text x="20" y="59" fill="#fff" font-weight="bold">ddev-xdebug-tui | PHP | index.php</text>

  <!-- Top row: Stack + Source -->
  <g>
    <!-- Stack panel -->
    <rect x="10" y="80" width="280" height="300" fill="none" stroke="#666" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="150" y="95" fill="#999" text-anchor="middle" font-size="13">Stack</text>

    <!-- Source panel -->
    <rect x="300" y="80" width="620" height="300" fill="none" stroke="#666" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="610" y="95" fill="#999" text-anchor="middle" font-size="13">Source</text>
    <!-- Source content -->
    <text x="315" y="120" fill="#ccc" font-size="13">Language: PHP</text>
    <text x="315" y="140" fill="#ccc" font-size="13">File:    file:///var/www/html/index.php</text>
  </g>

  <!-- Bottom row: Variables + Breakpoints -->
  <g>
    <rect x="10" y="400" width="450" height="320" fill="none" stroke="#666" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="235" y="415" fill="#999" text-anchor="middle" font-size="13">Variables</text>

    <rect x="470" y="400" width="450" height="320" fill="none" stroke="#666" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="695" y="415" fill="#999" text-anchor="middle" font-size="13">Breakpoints</text>
  </g>

  <!-- Command bar -->
  <rect x="10" y="735" width="910" height="28" fill="#2a2020" rx="2"/>
  <text x="20" y="754" fill="#aaa" font-size="13">Command:</text>
  <rect x="110" y="740" width="10" height="16" fill="#0f0"/>
</svg>
